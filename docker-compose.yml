services:
  # Servidor web Nginx
  nginx:
    image: nginx:alpine
    container_name: notion_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - notion_network

  # PHP-FPM
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: notion_php
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: notion_db
      DB_USERNAME: notion_user
      DB_PASSWORD: notion_pass
    depends_on:
      - mysql
      - redis
    networks:
      - notion_network

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: notion_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: notion_db
      MYSQL_USER: notion_user
      MYSQL_PASSWORD: notion_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - notion_network

  # Redis para cache
  redis:
    image: redis:alpine
    container_name: notion_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - notion_network

  # Node para compilar Vue.js (build de producción, se ejecuta y termina)
  node:
    image: node:18-alpine
    container_name: notion_node
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: sh -c "rm -f public/hot && npm install && npm run build"
    profiles:
      - build
    networks:
      - notion_network

volumes:
  mysql_data:
    driver: local

networks:
  notion_network:
    driver: bridge